name: sembast_sqflite
description: sembast NoSQL database support on top of sqflite, cross process safe database.
homepage: https://github.com/tekartik/sembast_sqflite/tree/master/sembast_sqflite
version: 2.2.1

environment:
  sdk: ^3.10.0

dependencies:
  sembast: ">=3.8.6 <5.0.0"
  sqflite_common: ">=2.5.6+1 <4.0.0"
  meta: ">=1.17.0 <3.0.0"
  collection: ">=1.19.1 <3.0.0"
  synchronized: ">=3.4.0+1 <5.0.0"
dev_dependencies:
  sqflite_common_ffi: ">=2.4.0+3"
  test: ">=1.31.0"
  process_run: ">=1.3.2"
  pub_semver: ">=2.2.0"
  yaml: ">=3.1.3"
  lints: ">=6.1.0"
